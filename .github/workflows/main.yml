name: Build All Binaries

on:
  push:
    branches: [ q2 ]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (major, minor, patch)'
        required: false
        default: 'patch'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache-dist.outputs.cache-hit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache dist
        id: cache-dist
        uses: actions/cache@v4
        with:
          path: dist
          key: dist-${{ github.sha }}

      - name: Set up Docker Buildx
        if: steps.cache-dist.outputs.cache-hit != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.cache-dist.outputs.cache-hit != 'true'
        run: docker build -t check-builder .

      - name: Create container from image
        if: steps.cache-dist.outputs.cache-hit != 'true'
        run: docker create --name check-builder-container check-builder

      - name: Copy binaries from container
        if: steps.cache-dist.outputs.cache-hit != 'true'
        run: |
          mkdir -p dist
          docker cp check-builder-container:/dist/. dist/

      - name: Clean up container
        if: steps.cache-dist.outputs.cache-hit != 'true'
        run: docker rm check-builder-container

      - name: List built files
        run: ls -l dist

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch all tags
        run: git fetch --tags

      - name: Get latest version tag
        id: get_version
        run: |
          latest_tag=$(git tag --list '*.*.*' --sort=-v:refname | head -n 1)
          if [ -z "$latest_tag" ]; then
            latest_tag="0.0.0"
          fi
          echo "latest_tag=$latest_tag" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: bump_version
        run: |
          bump="${{ github.event.inputs.bump || 'patch' }}"
          latest="${{ steps.get_version.outputs.latest_tag }}"
          if [[ "$latest" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
          else
            major=0; minor=0; patch=0
          fi
          case "$bump" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch|*) patch=$((patch+1)) ;;
          esac
          next="${major}.${minor}.${patch}"
          echo "next_version=$next" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git config user.name "DevOpsify"
          git config user.email "devopsifyco@gmail.com"
          git tag ${{ steps.bump_version.outputs.next_version }}
          git push origin ${{ steps.bump_version.outputs.next_version }}

      - name: Restore dist cache
        uses: actions/cache@v4
        with:
          path: dist
          key: dist-${{ github.sha }}

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.bump_version.outputs.next_version }}
          release_name: Release ${{ steps.bump_version.outputs.next_version }}
          draft: false
          prerelease: false

      - name: Get release upload URL
        id: get_upload_url
        run: |
          api_url="https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.bump_version.outputs.next_version }}"
          upload_url=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$api_url" | grep -o '"upload_url": *"[^"]*"' | sed 's/"upload_url": *"\([^"]*\)"/\1/' | sed 's/{?name,label}//')
          echo "upload_url=$upload_url" >> $GITHUB_OUTPUT

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.bump_version.outputs.next_version }}
          files: |
            dist/check.exe
            dist/check-linux-amd64
            dist/check-linux-arm64
            dist/check-macos-intel
            dist/check-macos-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
