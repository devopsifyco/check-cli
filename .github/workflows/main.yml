name: Build All Binaries

on:
  push:
    branches: [ github-action ]
    tags: [ 'v*' ]  # Trigger on version tags like v1.0.0
  pull_request:
    branches: [ github-action ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t check-builder .

      - name: Create container from image
        run: docker create --name check-builder-container check-builder

      - name: Copy binaries from container
        run: |
          mkdir -p dist
          docker cp check-builder-container:/dist/. dist/

      - name: Clean up container
        run: docker rm check-builder-container

      - name: List built files
        run: ls -l dist

      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: check-binaries
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: check-binaries
          path: dist/

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload check.exe
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/check.exe
          asset_name: check.exe
          asset_content_type: application/octet-stream

      - name: Upload check-linux-amd64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/check-linux-amd64
          asset_name: check-linux-amd64
          asset_content_type: application/octet-stream

      - name: Upload check-linux-arm64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/check-linux-arm64
          asset_name: check-linux-arm64
          asset_content_type: application/octet-stream

      - name: Upload check-macos-intel
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/check-macos-intel
          asset_name: check-macos-intel
          asset_content_type: application/octet-stream

      - name: Upload check-macos-arm64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/check-macos-arm64
          asset_name: check-macos-arm64
          asset_content_type: application/octet-stream 